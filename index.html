<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Phaser Library-->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.55.2/phaser.min.js"></script>
    <!--Google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Twinkle+Star&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
    <!--hardcode font -->
    <style>
      body {
        font-family: "Silkscreen", sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background-image: url('assets/wood-bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        }

      #console-wrapper {
        position: relative;
        width: min(858px, 95vw);
        aspect-ratio: 858 / 952.492;
        margin: 20px auto;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.624);
      }

      #console-frame {
        width: 100%;
        height: 100%;
        display: block;
      }

      #game-container {
        position: absolute;
        top: 1.57%;
        left: 3.26%;
        width: 93.24%;
        height: 63.00%;
        overflow: hidden;
        }

      #jump-button {
        position: absolute;
        bottom: 13.3%;
        left: 19.9%;
        transform: translate(-50%, -50%);
        width: 7.81%;
        height: 6.30%;
        font-size: clamp(12px, 2.5vw, 24px);
        background-color: #000000;
        color: #ffffff;
        border: 1px solid #ffffff;
        border-radius: 5px;
        cursor: pointer;
      }

      #up-button, #down-button {
        position: absolute;
        width: 8.74%;
        height: 7.87%;
        transform: translate(-50%, -50%);
        font-size: clamp(12px, 2.5vw, 24px);
        background-color: #000000;
        color: #ffffff;
        border: 1px solid #ffffff;
        border-radius: 50%;
        cursor: pointer;
      }

      #up-button {
        bottom: 17.3%;
        right: 11%;
      }

      #down-button {
        bottom: 2%;
        right: 11%;
      }
    </style>
    <title>Feather Rush</title>
  </head>
  <body>
    <div id="console-wrapper">
      <div id="game-container"></div>
      <img id="console-frame" src="assets/Console.png" alt="Console">

      <button id="jump-button">^</button>
      <button id="up-button"></button>
      <button id="down-button"></button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
